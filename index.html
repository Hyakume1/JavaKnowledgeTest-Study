<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>COP 3337 - Computer Programming II | Quiz</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <button class="sidebar-toggle" id="sidebarToggle" onclick="toggleSidebar()" aria-label="Toggle sections">&#9776;</button>
  <div>
    <h1>COP 3337 — Computer Programming II</h1>
    <div class="subtitle">Java Practice Questions</div>
  </div>
  <div class="mode-toggle">
    <button class="mode-btn active" id="studyBtn" onclick="setMode('study')">Study Mode</button>
    <button class="mode-btn" id="testBtn" onclick="setMode('test')">Test Mode</button>
  </div>
</header>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<div class="container">
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h2>Sections</h2>
      <button class="sidebar-close-btn" onclick="closeSidebar()" aria-label="Close sections">&#10005;</button>
    </div>
    <div id="sectionLinks"></div>
  </nav>

  <main class="main" id="main">
    <div class="mode-banner" id="modeBanner">
      Answers are highlighted in green. Switch to <strong>Test Mode</strong> to practice without seeing answers.
    </div>
    <div id="questions"></div>
  </main>

  <aside class="stats-panel" id="statsPanel">
    <h2>Progress</h2>
    <div class="stat-row"><span>Answered</span><span id="statAnswered">0 / 0</span></div>
    <div class="stat-row"><span class="correct">Correct</span><span class="correct" id="statCorrect">0</span></div>
    <div class="stat-row"><span class="incorrect">Incorrect</span><span class="incorrect" id="statIncorrect">0</span></div>
    <div class="pct-block">
      <div class="pct-label">Current Score</div>
      <div class="pct-value" id="percentageValue">—</div>
    </div>
    <button class="reset-btn" id="resetBtn" onclick="resetTest()">Reset Test</button>
  </aside>
</div>

<!-- Tutorial Modal -->
<div id="tutorialOverlay" class="tut-overlay" onclick="closeTutorial(event)">
  <div class="tut-modal">
    <div class="tut-modal-header">
      <h2 id="tutorialTitle"></h2>
      <button class="tut-close-btn" onclick="closeTutorial()">&times;</button>
    </div>
    <div class="tut-modal-body" id="tutorialBody"></div>
  </div>
</div>

<script src="js/data.js"></script>
<script src="js/quiz.js"></script>
</body>
</html>
